<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>워치독</title>
  <!-- TradingView Lightweight Charts (standalone production build, 버전 고정) -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root {
      --bg: #0c1018;
      --panel: #151b27;
      --panel-2: #1b2331;
      --border: #25303f;
      --text: #e6ebf2;
      --muted: #8b97a8;
      --up: #2ec26b;
      --down: #ff5d6c;
      --accent: #4c8dff;
      --shadow: 0 1px 0 rgba(255,255,255,0.03), 0 8px 24px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(1200px 600px at 80% -10%, #16203020, transparent), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 20px 56px; }
    header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px 14px; margin-bottom: 22px; }
    header .lead { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    header h1 { font-size: 22px; font-weight: 650; margin: 0; letter-spacing: -0.2px; }
    header .meta { color: var(--muted); font-size: 13px; }
    header .meta b { color: var(--text); font-weight: 600; }
    .refresh-btn { margin-left: 10px; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 4px 11px; font-size: 12px; cursor: pointer; transition: all .12s; }
    .refresh-btn:hover { border-color: var(--accent); }
    .refresh-btn:disabled { opacity: .55; cursor: default; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: #f0b73d; background: rgba(240,183,61,0.10);
      border: 1px solid rgba(240,183,61,0.35); border-radius: 999px; padding: 3px 10px;
      white-space: nowrap;
    }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; background: #f0b73d; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .card {
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 16px 14px;
      cursor: pointer;
      transition: border-color .15s ease, transform .1s ease;
      box-shadow: var(--shadow);
    }
    .card:hover { border-color: #36506f; }
    .card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow); }
    .card .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card .name { font-size: 15px; font-weight: 600; }
    .card .ticker { font-size: 12px; color: var(--muted); margin-top: 2px; font-variant-numeric: tabular-nums; }
    .card .tag {
      font-size: 11px; color: var(--muted); border: 1px solid var(--border);
      padding: 2px 7px; border-radius: 999px; white-space: nowrap;
    }
    .card .price { font-size: 26px; font-weight: 680; margin: 14px 0 2px; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
    .card .price.dim { color: var(--muted); font-weight: 500; }
    .card .change { font-size: 13.5px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .change.up { color: var(--up); }
    .change.down { color: var(--down); }
    .change.flat { color: var(--muted); }
    .card .err { font-size: 11px; color: var(--down); margin-top: 6px; opacity: .85; }
    .card .warn-lev { font-size: 10.5px; color: #f0b73d; margin-top: 9px; line-height: 1.45; border-top: 1px dashed var(--border); padding-top: 7px; }

    .chart-panel {
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 18px 14px;
      box-shadow: var(--shadow);
    }
    .chart-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .chart-head .title { font-size: 16px; font-weight: 620; }
    .chart-head .title span { color: var(--muted); font-weight: 500; font-size: 13px; margin-left: 6px; }
    .periods { display: flex; gap: 6px; }
    .periods button {
      background: var(--panel); color: var(--muted); border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 11px; font-size: 12.5px; cursor: pointer; transition: all .12s;
    }
    .periods button:hover { color: var(--text); }
    .periods button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chart-head .chg { font-size: 13px; font-weight: 700; margin-left: 8px; font-variant-numeric: tabular-nums; }
    .chart-head .chg.up { color: var(--up); }
    .chart-head .chg.down { color: var(--down); }

    /* 지표 토글 칩 */
    .chart-tools { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
    .chip-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .chip-row .lbl { font-size: 11.5px; color: var(--muted); margin-right: 2px; }
    .chip {
      background: var(--panel); border: 1px solid var(--border); border-radius: 999px;
      padding: 4px 10px; font-size: 11.5px; cursor: pointer; transition: all .12s;
      color: var(--muted); font-variant-numeric: tabular-nums; user-select: none;
    }
    .chip:hover { color: var(--text); }
    .chip.on { color: #fff; border-color: transparent; }
    .chip.ma5.on  { background: #f0b73d; }
    .chip.ma20.on { background: #4c8dff; }
    .chip.ma60.on { background: #c678dd; }
    .chip.lower.on { background: var(--accent); border-color: var(--accent); color: #fff; }

    .chart-box { position: relative; width: 100%; height: 420px; }
    .chart-empty { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; pointer-events: none; }
    .lower-box { position: relative; width: 100%; height: 140px; margin-top: 4px; }
    .lower-box.hidden { display: none; }
    .lower-cap { font-size: 11px; color: var(--muted); margin: 6px 2px 0; }

    /* 재무 요약 패널 */
    .fin-panel {
      margin-top: 18px; background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; box-shadow: var(--shadow);
    }
    .fin-head { font-size: 14px; font-weight: 620; margin-bottom: 12px; display: flex; align-items: baseline; gap: 8px; }
    .fin-head .asof { font-size: 11px; color: var(--muted); font-weight: 500; }
    .fin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px 18px; }
    .fin-item .k { font-size: 11px; color: var(--muted); }
    .fin-item .v { font-size: 16px; font-weight: 640; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .fin-note { font-size: 12.5px; color: var(--muted); }

    footer { margin-top: 22px; color: var(--muted); font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="lead">
        <h1>🐕 워치독 <span style="font-size:13px;color:var(--muted);font-weight:500;">Watchdog</span></h1>
        <span class="badge"><span class="dot"></span>준실시간 · 약 15분 지연</span>
        <span class="badge" style="color:#6ea8fe;background:rgba(110,168,254,0.10);"><span class="dot" style="background:#6ea8fe;"></span>향후 KIS 실시간 연동 예정</span>
      </div>
      <div class="meta">마지막 갱신 <b id="updated">—</b> · 30초 자동 갱신 · 데이터: 무료 소스(추후 한국투자증권 OpenAPI 실시간으로 교체 예정)
        <button id="refreshBtn" class="refresh-btn" onclick="forceRefresh()">🔄 강제 동기화</button></div>
    </header>

    <section class="grid" id="cards"></section>

    <section class="chart-panel">
      <div class="chart-head">
        <div class="title" id="chartTitle">차트 <span id="chartSub"></span><span id="chartChange" class="chg"></span></div>
        <div class="periods" id="periods">
          <button data-p="1mo">1개월</button>
          <button data-p="3mo" class="active">3개월</button>
          <button data-p="6mo">6개월</button>
          <button data-p="1y">1년</button>
        </div>
      </div>

      <div class="chart-tools">
        <div class="chip-row">
          <span class="lbl">이동평균</span>
          <span class="chip ma5 on"  data-ma="5">MA5</span>
          <span class="chip ma20 on" data-ma="20">MA20</span>
          <span class="chip ma60"    data-ma="60">MA60</span>
        </div>
        <div class="chip-row" id="lowerToggle">
          <span class="lbl">보조지표</span>
          <span class="chip lower on" data-lower="rsi">RSI</span>
          <span class="chip lower"    data-lower="macd">MACD</span>
          <span class="chip lower"    data-lower="none">없음</span>
        </div>
      </div>

      <div class="chart-box" id="chartBox">
        <div class="chart-empty" id="chartEmpty">데이터 없음</div>
      </div>
      <div class="lower-box" id="lowerBox"></div>
      <div class="lower-cap" id="lowerCap"></div>
    </section>

    <section class="fin-panel" id="finPanel">
      <div class="fin-head">재무 요약 <span class="asof" id="finAsof"></span></div>
      <div id="finBody"><div class="fin-note">불러오는 중…</div></div>
    </section>

    <footer>매매 판단 보조 도구 · 시세는 참고용이며, 최종 투자 판단과 책임은 본인에게 있습니다.</footer>
  </div>

  <script>
    const KRW = new Intl.NumberFormat("ko-KR");
    const USD = new Intl.NumberFormat("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    let selected = null;       // 선택된 심볼
    let period = "3mo";
    let quotesById = {};
    let lastRows = [];         // 현재 차트에 들어간 OHLC 행들

    // ---- 가격/등락 포맷 (카드용) ----
    function fmtPrice(q) {
      if (q.price === null || q.price === undefined) return "—";
      if (q.currency === "KRW") return KRW.format(Math.round(q.price)) + "원";
      return "$" + USD.format(q.price);
    }
    function changeClass(pct) {
      if (pct === null || pct === undefined) return "flat";
      return pct >= 0 ? "up" : "down";
    }
    function fmtChange(pct) {
      if (pct === null || pct === undefined) return "변동 없음";
      const sign = pct >= 0 ? "▲ +" : "▼ ";
      return sign + pct.toFixed(2) + "%";
    }

    function renderCards(quotes) {
      const root = document.getElementById("cards");
      root.innerHTML = "";
      if (!selected && quotes.length) selected = quotes[0].symbol; // 기본 = 첫 종목(삼성전자)
      quotes.forEach((q) => {
        quotesById[q.symbol] = q;
        const hasPrice = q.price !== null && q.price !== undefined;
        const el = document.createElement("div");
        el.className = "card" + (q.symbol === selected ? " active" : "");
        el.onclick = () => selectSymbol(q.symbol);
        el.innerHTML = `
          <div class="top">
            <div>
              <div class="name">${q.name}</div>
              <div class="ticker">${q.symbol}</div>
            </div>
            <div class="tag">${q.note || (q.currency === "KRW" ? "코스피" : "")}</div>
          </div>
          <div class="price ${hasPrice ? "" : "dim"}">${hasPrice ? fmtPrice(q) : "로딩 중…"}</div>
          <div class="change ${changeClass(q.change_pct)}">${fmtChange(q.change_pct)}</div>
          ${q.error ? `<div class="err">데이터 없음</div>` : ""}
          ${(q.note || "").includes("레버리지") ? `<div class="warn-lev">⚠️ 매수 전 교육 필수(미이수 시 매수 불가) · 비용 약 8,000원 발생 · 음의 복리 유의</div>` : ""}
        `;
        root.appendChild(el);
      });
    }

    function selectSymbol(symbol) {
      selected = symbol;
      document.querySelectorAll(".card").forEach((c) => c.classList.remove("active"));
      const q = quotesById[symbol];
      document.getElementById("chartSub").textContent = q ? `${q.name} (${symbol})` : symbol;
      renderCards(Object.values(quotesById));
      loadHistory();
      loadFundamentals();
    }

    async function loadQuotes(fresh = false) {
      try {
        const res = await fetch(fresh ? "/api/quotes?fresh=1" : "/api/quotes");
        const data = await res.json();
        renderCards(data.quotes);
        const q = quotesById[selected];
        document.getElementById("chartSub").textContent = q ? `${q.name} (${selected})` : (selected || "");
        document.getElementById("updated").textContent = new Date().toLocaleTimeString("ko-KR");
      } catch (e) {
        // 네트워크 오류여도 화면은 유지
      }
    }

    async function loadHistory(fresh = false) {
      if (!selected) return;
      const empty = document.getElementById("chartEmpty");
      try {
        const res = await fetch(`/api/history/${encodeURIComponent(selected)}?period=${period}${fresh ? "&fresh=1" : ""}`);
        const data = await res.json();
        const rows = (data.history || []).filter((r) => r && r.close != null);
        if (!rows.length) { lastRows = []; renderChart([]); empty.style.display = "flex"; return; }
        empty.style.display = "none";
        lastRows = rows;
        renderChart(rows);
      } catch (e) {
        lastRows = [];
        renderChart([]);
        empty.style.display = "flex";
      }
    }

    // ===================== Lightweight Charts =====================
    const LWC = window.LightweightCharts;
    let priceChart = null, lowerChart = null;
    let candleSeries = null, volSeries = null;
    const maSeries = {};                  // {5: series, 20:..., 60:...}
    const maOn = { 5: true, 20: true, 60: false };
    let lowerMode = "rsi";                // rsi | macd | none

    const theme = {
      bg: "#0c1018", text: "#8b97a8", grid: "rgba(255,255,255,0.05)",
      up: "#2ec26b", down: "#ff5d6c",
      ma: { 5: "#f0b73d", 20: "#4c8dff", 60: "#c678dd" },
      rsi: "#4c8dff", macd: "#4c8dff", signal: "#f0b73d",
    };

    function curOf() { return (quotesById[selected] || {}).currency; }

    // 가격축 포맷 (KRW: 만/억, USD: $)
    function priceFmt(v) {
      const cur = curOf();
      if (cur === "KRW") {
        if (v >= 100000000) return (v / 100000000).toFixed(v >= 1e9 ? 0 : 1).replace(/\.0$/, "") + "억";
        if (v >= 10000) return (v / 10000).toFixed(v >= 1000000 ? 0 : 1).replace(/\.0$/, "") + "만";
        return Math.round(v).toLocaleString();
      }
      return "$" + Number(v).toLocaleString(undefined, { maximumFractionDigits: 2 });
    }

    function baseChartOptions(extra) {
      return Object.assign({
        layout: { background: { color: "transparent" }, textColor: theme.text, fontSize: 11,
                  fontFamily: '-apple-system, "Segoe UI", "Malgun Gothic", sans-serif' },
        grid: { vertLines: { visible: false }, horzLines: { color: theme.grid } },
        rightPriceScale: { borderVisible: false, scaleMargins: { top: 0.12, bottom: 0.08 } },
        timeScale: { borderVisible: false, timeVisible: false, secondsVisible: false, fixLeftEdge: true, fixRightEdge: true },
        crosshair: {
          mode: LWC.CrosshairMode.Magnet,
          vertLine: { color: "rgba(255,255,255,0.22)", width: 1, style: 3, labelBackgroundColor: "#2b3a4d" },
          horzLine: { color: "rgba(255,255,255,0.22)", width: 1, style: 3, labelBackgroundColor: "#2b3a4d" },
        },
        handleScale: false, handleScroll: false,
      }, extra || {});
    }

    function ensureCharts() {
      if (priceChart) return;
      const box = document.getElementById("chartBox");
      priceChart = LWC.createChart(box, baseChartOptions({
        width: box.clientWidth, height: box.clientHeight,
        localization: { priceFormatter: priceFmt },
      }));
      candleSeries = priceChart.addCandlestickSeries({
        upColor: theme.up, downColor: theme.down,
        wickUpColor: theme.up, wickDownColor: theme.down,
        borderVisible: false, priceLineVisible: false, lastValueVisible: true,
      });
      // 거래량 — 하단에 얇게 오버레이 (자체 price scale, 아래 20%)
      volSeries = priceChart.addHistogramSeries({
        priceScaleId: "vol", priceFormat: { type: "volume" }, priceLineVisible: false, lastValueVisible: false,
      });
      priceChart.priceScale("vol").applyOptions({ scaleMargins: { top: 0.82, bottom: 0 }, borderVisible: false });

      [5, 20, 60].forEach((p) => {
        maSeries[p] = priceChart.addLineSeries({
          color: theme.ma[p], lineWidth: 1.6, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
        });
      });

      const lbox = document.getElementById("lowerBox");
      lowerChart = LWC.createChart(lbox, baseChartOptions({ width: lbox.clientWidth, height: lbox.clientHeight }));

      // 두 차트의 시간축 동기화 (크로스헤어/스크롤 일관성)
      syncTimeScales(priceChart, lowerChart);

      // 반응형: 컨테이너 폭에 맞춤
      const ro = new ResizeObserver(() => {
        priceChart.applyOptions({ width: box.clientWidth, height: box.clientHeight });
        lowerChart.applyOptions({ width: lbox.clientWidth, height: lbox.clientHeight });
      });
      ro.observe(box); ro.observe(lbox);
    }

    function syncTimeScales(a, b) {
      let lock = false;
      const link = (src, dst) => src.timeScale().subscribeVisibleLogicalRangeChange((r) => {
        if (lock || !r) return; lock = true; dst.timeScale().setVisibleLogicalRange(r); lock = false;
      });
      link(a, b); link(b, a);
    }

    // ---- 지표 계산 (close 배열 기반) ----
    function sma(values, period) {
      const out = new Array(values.length).fill(null);
      let sum = 0;
      for (let i = 0; i < values.length; i++) {
        sum += values[i];
        if (i >= period) sum -= values[i - period];
        if (i >= period - 1) out[i] = sum / period;
      }
      return out;
    }
    function rsi(values, period) {
      const out = new Array(values.length).fill(null);
      if (values.length <= period) return out;
      let gain = 0, loss = 0;
      for (let i = 1; i <= period; i++) {
        const d = values[i] - values[i - 1];
        if (d >= 0) gain += d; else loss -= d;
      }
      let avgG = gain / period, avgL = loss / period;
      out[period] = avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL);
      for (let i = period + 1; i < values.length; i++) {
        const d = values[i] - values[i - 1];
        const g = d >= 0 ? d : 0, l = d < 0 ? -d : 0;
        avgG = (avgG * (period - 1) + g) / period;
        avgL = (avgL * (period - 1) + l) / period;
        out[i] = avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL);
      }
      return out;
    }
    function ema(values, period) {
      const out = new Array(values.length).fill(null);
      const k = 2 / (period + 1);
      let prev = null;
      for (let i = 0; i < values.length; i++) {
        const v = values[i];
        prev = prev === null ? v : v * k + prev * (1 - k);
        out[i] = prev;
      }
      return out;
    }
    function macd(values, fast, slow, signal) {
      const ef = ema(values, fast), es = ema(values, slow);
      const line = values.map((_, i) => (ef[i] != null && es[i] != null) ? ef[i] - es[i] : null);
      // signal = EMA of macd line (null 구간은 건너뜀)
      const sig = new Array(values.length).fill(null);
      const k = 2 / (signal + 1); let prev = null;
      for (let i = 0; i < line.length; i++) {
        if (line[i] == null) continue;
        prev = prev === null ? line[i] : line[i] * k + prev * (1 - k);
        sig[i] = prev;
      }
      const hist = line.map((v, i) => (v != null && sig[i] != null) ? v - sig[i] : null);
      return { line, sig, hist };
    }

    function paired(times, arr) {
      const out = [];
      for (let i = 0; i < arr.length; i++) if (arr[i] != null) out.push({ time: times[i], value: arr[i] });
      return out;
    }

    function renderChart(rows) {
      ensureCharts();
      // 시간축은 'YYYY-MM-DD' 비즈니스데이 문자열 사용
      const times = rows.map((r) => r.date);
      const closes = rows.map((r) => r.close);

      // 헤더 기간 등락%
      const chg = document.getElementById("chartChange");
      if (closes.length >= 2 && closes[0]) {
        const pct = (closes[closes.length - 1] - closes[0]) / closes[0] * 100;
        chg.textContent = (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%";
        chg.className = "chg " + (pct >= 0 ? "up" : "down");
      } else { chg.textContent = ""; chg.className = "chg"; }

      if (!rows.length) {
        candleSeries.setData([]); volSeries.setData([]);
        [5, 20, 60].forEach((p) => maSeries[p].setData([]));
        renderLower([], []);
        return;
      }

      candleSeries.setData(rows.map((r) => ({ time: r.date, open: r.open, high: r.high, low: r.low, close: r.close })));
      volSeries.setData(rows.map((r) => ({
        time: r.date, value: r.volume || 0,
        color: (r.close >= r.open) ? "rgba(46,194,107,0.35)" : "rgba(255,93,108,0.35)",
      })));

      [5, 20, 60].forEach((p) => {
        if (maOn[p]) { maSeries[p].setData(paired(times, sma(closes, p))); maSeries[p].applyOptions({ visible: true }); }
        else { maSeries[p].setData([]); maSeries[p].applyOptions({ visible: false }); }
      });

      renderLower(times, closes);
      priceChart.timeScale().fitContent();
    }

    // 하단 보조지표 차트 (RSI / MACD / 없음)
    let lowerSeries = [];
    function clearLower() { lowerSeries.forEach((s) => lowerChart.removeSeries(s)); lowerSeries = []; }

    function renderLower(times, closes) {
      const box = document.getElementById("lowerBox");
      const cap = document.getElementById("lowerCap");
      if (!lowerChart) return;
      clearLower();
      if (lowerMode === "none" || !times.length) {
        box.classList.add("hidden"); cap.textContent = ""; return;
      }
      box.classList.remove("hidden");

      if (lowerMode === "rsi") {
        const s = lowerChart.addLineSeries({ color: theme.rsi, lineWidth: 1.6, priceLineVisible: false, lastValueVisible: true });
        s.setData(paired(times, rsi(closes, 14)));
        // 과매수/과매도 기준선 70/30
        s.createPriceLine({ price: 70, color: "rgba(255,93,108,0.5)", lineWidth: 1, lineStyle: 2, axisLabelVisible: true });
        s.createPriceLine({ price: 30, color: "rgba(46,194,107,0.5)", lineWidth: 1, lineStyle: 2, axisLabelVisible: true });
        lowerChart.priceScale("right").applyOptions({ autoScale: false, mode: 0 });
        s.applyOptions({ autoscaleInfoProvider: () => ({ priceRange: { minValue: 0, maxValue: 100 } }) });
        lowerSeries.push(s);
        cap.textContent = "RSI(14) · 70 과매수 / 30 과매도";
      } else if (lowerMode === "macd") {
        const m = macd(closes, 12, 26, 9);
        const hist = lowerChart.addHistogramSeries({ priceLineVisible: false, lastValueVisible: false });
        hist.setData(times.map((t, i) => m.hist[i] == null ? null : ({
          time: t, value: m.hist[i], color: m.hist[i] >= 0 ? "rgba(46,194,107,0.5)" : "rgba(255,93,108,0.5)",
        })).filter(Boolean));
        const lineS = lowerChart.addLineSeries({ color: theme.macd, lineWidth: 1.6, priceLineVisible: false, lastValueVisible: false });
        lineS.setData(paired(times, m.line));
        const sigS = lowerChart.addLineSeries({ color: theme.signal, lineWidth: 1.4, priceLineVisible: false, lastValueVisible: false });
        sigS.setData(paired(times, m.sig));
        lowerSeries.push(hist, lineS, sigS);
        cap.textContent = "MACD(12,26,9) · 파랑 MACD / 노랑 시그널 / 막대 히스토그램";
      }
      lowerChart.timeScale().fitContent();
    }

    // ---- 토글 핸들러 ----
    document.querySelector(".chip-row").addEventListener("click", (e) => {
      const chip = e.target.closest(".chip[data-ma]");
      if (!chip) return;
      const p = Number(chip.dataset.ma);
      maOn[p] = !maOn[p];
      chip.classList.toggle("on", maOn[p]);
      if (lastRows.length) renderChart(lastRows);
    });
    document.getElementById("lowerToggle").addEventListener("click", (e) => {
      const chip = e.target.closest(".chip[data-lower]");
      if (!chip) return;
      lowerMode = chip.dataset.lower;
      document.querySelectorAll("#lowerToggle .chip").forEach((c) => c.classList.toggle("on", c === chip));
      if (lastRows.length) {
        renderLower(lastRows.map((r) => r.date), lastRows.map((r) => r.close));
      } else { renderLower([], []); }
    });

    // ===================== 재무 요약 (LIVE 전용) =====================
    function fmtMarcap(v) {
      if (v == null) return "—";
      if (v >= 1e12) return (v / 1e12).toFixed(1).replace(/\.0$/, "") + "조원";
      if (v >= 1e8) return (v / 1e8).toFixed(0) + "억원";
      return KRW.format(Math.round(v)) + "원";
    }
    function finRow(k, v) { return `<div class="fin-item"><div class="k">${k}</div><div class="v">${v}</div></div>`; }

    async function loadFundamentals() {
      const body = document.getElementById("finBody");
      const asof = document.getElementById("finAsof");
      asof.textContent = "";
      if (!selected) return;
      body.innerHTML = `<div class="fin-note">불러오는 중…</div>`;
      try {
        const res = await fetch(`/api/fundamentals/${encodeURIComponent(selected)}`);
        const d = await res.json();
        if (!d.available) {
          body.innerHTML = `<div class="fin-note">재무 정보 없음 (ETF/선물)</div>`;
          return;
        }
        const num = (x, suffix = "") => (x == null ? "—" : x.toLocaleString(undefined, { maximumFractionDigits: 2 }) + suffix);
        body.innerHTML = `<div class="fin-grid">
          ${finRow("PER", num(d.per, "배"))}
          ${finRow("PBR", num(d.pbr, "배"))}
          ${finRow("시가총액", fmtMarcap(d.market_cap))}
          ${finRow("배당수익률", num(d.div, "%"))}
          ${finRow("EPS", d.eps == null ? "—" : KRW.format(Math.round(d.eps)) + "원")}
          ${finRow("BPS", d.bps == null ? "—" : KRW.format(Math.round(d.bps)) + "원")}
        </div>`;
        asof.textContent = d.asof ? `기준일 ${d.asof}` : "";
      } catch (e) {
        body.innerHTML = `<div class="fin-note">재무 정보를 불러오지 못했습니다.</div>`;
      }
    }

    // ---- 기간 토글 ----
    document.getElementById("periods").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      period = btn.dataset.p;
      document.querySelectorAll("#periods button").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      loadHistory();
    });

    async function forceRefresh() {
      const btn = document.getElementById("refreshBtn");
      if (btn) { btn.disabled = true; btn.textContent = "갱신 중…"; }
      try { await loadQuotes(true); await loadHistory(true); await loadFundamentals(); }
      finally { if (btn) { btn.disabled = false; btn.textContent = "🔄 강제 동기화"; } }
    }

    (async function init() {
      await loadQuotes();
      await loadHistory();
      await loadFundamentals();
      setInterval(loadQuotes, 30000); // 시세 30초 자동 갱신
    })();
  </script>
</body>
</html>
